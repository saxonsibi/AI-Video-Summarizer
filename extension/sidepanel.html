<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoIQ Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="frame-wrap">
      <iframe id="appFrame" title="VideoIQ App" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </main>

    <div class="panel-tools" aria-label="Extension controls">
      <button id="reloadBtn" title="Reload app">Reload</button>
      <button id="openTabBtn" title="Open full app in tab">Open Tab</button>
      <button id="settingsBtn" title="Extension settings">Settings</button>
    </div>

    <div id="errorBox" class="error hidden"></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
